<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelola Password - BtoaApp</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Memanggil CSS Global dan CSS Khusus Password -->
    <link rel="stylesheet" href="css/tema.css?v=11">
    <link rel="stylesheet" href="css/password.css?v=11">
</head>
<body>

    <div class="app-container">
        
        <!-- Header -->
        <header class="header">
            <a href="dashboard.html" class="icon-btn" style="text-decoration: none; color: inherit;"><i class="bi bi-arrow-left"></i></a>
            <h1 class="header-title">Password</h1>
            <div style="width: 40px;"></div>
        </header>

        <!-- Main Content -->
        <main class="content-area">
            <!-- Pencarian -->
            <div class="search-container">
                <span class="search-icon"><i class="bi bi-search"></i></span>
                <input type="text" class="search-input" id="search-pass" placeholder="Cari folder atau entri akun..." onkeyup="filterFolders()">
            </div>

            <!-- TAMPILAN FOLDER GRID -->
            <div id="folder-container" class="folder-grid"></div>
        </main>

        <button class="fab-single" onclick="openAddModal()"><i class="bi bi-plus-lg"></i></button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon"><i class="bi bi-house-door"></i></span><span class="nav-text">Beranda</span>
            </a>
            <a href="password.html" class="nav-item active">
                <span class="nav-icon"><i class="bi bi-key-fill"></i></span><span class="nav-text">Password</span>
            </a>
            <a href="notes.html" class="nav-item">
                <span class="nav-icon"><i class="bi bi-journal-text"></i></span><span class="nav-text">Notes</span>
            </a>
            <a href="todo.html" class="nav-item">
                <span class="nav-icon"><i class="bi bi-check2-square"></i></span><span class="nav-text">ToDo</span>
            </a>
            <a href="travel.html" class="nav-item">
                <span class="nav-icon"><i class="bi bi-scooter"></i></span><span class="nav-text">Travel</span>
            </a>
        </nav>

        <!-- MODAL 1: ISI FOLDER (Daftar Vertikal) -->
        <div class="modal-overlay" id="folder-modal" onclick="closeFolderModal(event)">
            <div class="modal-content" style="background: var(--bg-color); max-width: 480px; width: 100%; border-radius: 20px 20px 0 0; min-height: 80vh; margin-top: auto; padding-bottom: 50px;">
                <button class="close-modal" onclick="document.getElementById('folder-modal').classList.remove('active')"><i class="bi bi-x-lg"></i></button>
                <h2 class="form-title" id="folder-title" style="text-align: left; margin-bottom: 20px; font-size: 24px;">📁 Kategori</h2>
                <div id="folder-items-container"></div>
            </div>
        </div>

        <!-- MODAL 2: BOTTOM SHEET DETAIL PRATINJAU -->
        <div class="bottom-sheet-overlay" id="detail-sheet" onclick="closeDetailSheet(event)">
            <div class="bottom-sheet-content">
                <div class="sheet-drag-handle" onclick="document.getElementById('detail-sheet').classList.remove('active')"></div>
                
                <div class="sheet-header">
                    <h2 class="sheet-title" id="detail-app">Nama Aplikasi</h2>
                    <div class="badge-group">
                        <span class="badge badge-create"><i class="bi bi-calendar-plus"></i> <span id="detail-created"></span></span>
                        <span class="badge badge-update"><i class="bi bi-clock-history"></i> <span id="detail-updated"></span></span>
                    </div>
                </div>

                <div class="sheet-body">
                    <div class="info-box">
                        <div class="info-label">Kategori</div>
                        <div class="info-val" id="detail-cat">...</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Username</div>
                        <div class="info-val" id="detail-user">...</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Email</div>
                        <div class="info-val" id="detail-email">...</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Password</div>
                        <div class="info-val" id="detail-pass">...</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Catatan Tambahan</div>
                        <div class="info-val" id="detail-notes" style="font-weight: 400;">...</div>
                    </div>
                    <div class="info-box" id="detail-img-box" style="display: none;">
                        <div class="info-label">Lampiran Gambar</div>
                        <div class="info-val"><img id="detail-img" src=""></div>
                    </div>
                </div>

                <div class="sheet-actions">
                    <button class="btn-sheet btn-share" onclick="shareCurrentEntry()"><i class="bi bi-share-fill"></i> SHARE</button>
                    <button class="btn-sheet btn-edit" onclick="editCurrentEntry()"><i class="bi bi-pencil-square"></i> UBAH</button>
                    <button class="btn-sheet btn-delete" onclick="deleteCurrentEntry()"><i class="bi bi-trash3-fill"></i> HAPUS</button>
                </div>
            </div>
        </div>

        <!-- MODAL 3: FORM INPUT -->
        <div class="modal-overlay" id="add-modal">
            <div class="modal-content">
                <button class="close-modal" onclick="closeFormModal()"><i class="bi bi-x-lg"></i></button>
                <h2 class="form-title" id="form-modal-title">Tambah Password Baru</h2>
                
                <form id="add-pass-form" onsubmit="savePassword(event)">
                    <input type="hidden" id="input-id">

                    <div class="form-group">
                        <label class="form-label">Kategori</label>
                        <input list="category-options" id="input-category" class="form-input" placeholder="Ketik atau pilih kategori">
                        <datalist id="category-options"></datalist>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nama Aplikasi/Web</label>
                        <input type="text" id="input-app" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="input-user" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="input-email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div style="position: relative;">
                            <input type="password" id="input-pass" class="form-input" required style="padding-right: 40px;">
                            <span id="eye-icon" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer;" onclick="toggleVisibility()"><i class="bi bi-eye"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Catatan Tambahan</label>
                        <div class="editor-container">
                            <div class="editor-toolbar">
                                <button type="button" class="toolbar-btn" onclick="execCmd('bold')"><b>B</b></button>
                                <button type="button" class="toolbar-btn" onclick="execCmd('italic')"><i>I</i></button>
                                <button type="button" class="toolbar-btn" onclick="execCmd('strikethrough')"><strike>S</strike></button>
                                <button type="button" class="toolbar-btn" onclick="execCmd('insertUnorderedList')">List</button>
                                <button type="button" class="toolbar-btn" onclick="insertLink()">Link</button>
                                <button type="button" class="toolbar-btn" onclick="insertTable()">Tabel</button>
                                <button type="button" class="toolbar-btn" onclick="execCmd('removeFormat')" style="color:red;"><i class="bi bi-eraser-fill"></i></button>
                            </div>
                            <div id="input-notes" class="editor-content" contenteditable="true" placeholder="Ketik catatan..."></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Lampiran Gambar</label>
                        <div class="file-upload-wrapper">
                            <span class="file-upload-btn"><i class="bi bi-image"></i> Pilih Gambar</span>
                            <input type="file" id="input-image" accept="image/*" onchange="previewImage(event)">
                        </div>
                        <img id="image-preview" class="img-preview" src="">
                    </div>
                    
                    <button type="submit" class="btn-primary" id="btn-save"><i class="bi bi-save"></i> Simpan Data</button>
                </form>
            </div>
        </div>

        <div id="toast" class="toast-box">Pesan muncul di sini</div>

    </div>

        <div id="toast" class="toast-box">Pesan muncul di sini</div>

    </div>
    
    <!-- Auth Guard & Page Logic -->
    <script src="js/auth-guard.js" type="module"></script>
    <script src="js/password.js" type="module"></script>
</body>
</html>
